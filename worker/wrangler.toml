name = "washu-em-sim-intelligence"
main = "src/index.ts"
compatibility_date = "2024-04-03"
workers_dev = true

[triggers]
crons = ["0 0 * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[vars]
# Add any public environment variables here

[[d1_databases]]
binding = "DB"
database_name = "washu_sim_db"
database_id = "51d29c82-d58d-46b0-8695-d08690ed669a"

[[kv_namespaces]]
binding = "RATELIMIT"
id = "c33f40661cf9465bb2e9ef4e88396f01"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "washu-sim-intel-storage-2026"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "sim_search"

# Commands to remember:
# npx wrangler d1 create washu_sim_db
# npx wrangler d1 execute washu_sim_db --file=./schema.sql
# npx wrangler dev
# npx wrangler deploy
