<!DOCTYPE html>
<html>
<head>
    <title>WashU EM Sim - Server Health Check</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: bold;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #A51417;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #8B0F12;
        }
        pre {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>WashU EM Sim - Server Health Check</h1>
    
    <button onclick="checkHealth()">Check Server Health</button>
    
    <div id="result"></div>

    <script>
        async function checkHealth() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Checking server...</p>';
            
            try {
                // Get project info from your actual app
                const API_BASE = 'REPLACE_WITH_YOUR_API_BASE'; // You'll need to replace this
                
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="status success">
                            ✓ Server is running!
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="status error">
                            ✗ Server responded but with error status: ${response.status}
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status error">
                        ✗ Cannot connect to server
                        <pre>${error.message}</pre>
                        <p>Possible issues:</p>
                        <ul>
                            <li>Server is not running</li>
                            <li>Wrong API URL</li>
                            <li>Network connection problem</li>
                            <li>CORS issue</li>
                        </ul>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
