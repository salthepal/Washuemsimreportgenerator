<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Box Authentication Callback</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; }
        .card { background: white; padding: 2rem; border-radius: 1rem; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); max-width: 400px; text-align: center; }
        .error { color: #e11d48; font-weight: 600; }
        .code { background: #f1f5f9; padding: 0.5rem; border-radius: 0.5rem; font-family: monospace; font-size: 0.8rem; margin-top: 1rem; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card" id="status">
        <p>Authenticating with Box...</p>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        
        // 1. Check for token in Hash (Success path)
        if (window.location.hash.includes('access_token')) {
            const hashString = window.location.hash.substring(1);
            const params = new URLSearchParams(hashString);
            const token = params.get('access_token');
            
            if (token && window.opener) {
                window.opener.postMessage({ type: 'BOX_AUTH_SUCCESS', token: token }, window.location.origin);
                statusDiv.innerHTML = '<p style="color: #059669; font-weight: 600;">Success! Closing window...</p>';
                setTimeout(() => window.close(), 1000);
            }
        } 
        // 2. Check for error in Query or Hash (Error path)
        else {
            const params = new URLSearchParams(window.location.search || window.location.hash.substring(1));
            const error = params.get('error') || 'unknown_error';
            const description = params.get('error_description') || 'No additional details provided.';

            statusDiv.innerHTML = '';

            const title = document.createElement('p');
            title.className = 'error';
            title.textContent = 'Authentication Failed';

            const details = document.createElement('p');
            details.style.fontSize = '0.9rem';
            details.style.color = '#64748b';
            details.textContent = description;

            const code = document.createElement('div');
            code.className = 'code';
            code.textContent = `Error Code: ${error}`;

            const closeButton = document.createElement('button');
            closeButton.textContent = 'Close Window';
            closeButton.style.marginTop = '1.5rem';
            closeButton.style.padding = '0.5rem 1rem';
            closeButton.style.background = '#1e293b';
            closeButton.style.color = 'white';
            closeButton.style.border = 'none';
            closeButton.style.borderRadius = '0.5rem';
            closeButton.style.cursor = 'pointer';
            closeButton.addEventListener('click', () => window.close());

            statusDiv.appendChild(title);
            statusDiv.appendChild(details);
            statusDiv.appendChild(code);
            statusDiv.appendChild(closeButton);
        }
    </script>
</body>
</html>
